name: download-apk-debug

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Download
        run: |
          echo "---- CURL DEBUG START ----"
          curl -v -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: */*" \
            -H "Connection: keep-alive" \
            -o Hidezen_VPN.apk \
            https://hidezen.com/download/Hidezen_VPN.apk
          echo "---- CURL DEBUG END ----"

      - name: Show file info
        run: |
          echo "File info:"
          ls -lh Hidezen_VPN.apk

      - name: Show first 100 lines of file (to detect HTML errors)
        run: |
          echo "---- FILE CONTENT PREVIEW ----"
          head -n 100 Hidezen_VPN.apk
